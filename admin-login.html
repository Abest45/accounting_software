<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - FinAnalytics">
    <meta name="theme-color" content="#2c3e50">
    <title>Admin Login - FinAnalytics</title>
    <link rel="stylesheet" href="auth-forms.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' fill='%232c3e50'>₹</text></svg>">
</head>
<body>
    <!-- Background Elements -->
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <span class="logo-text">FinAnalytics</span>
            </div>
            <p class="tagline">Professional Financial Management System</p>
        </header>

        <!-- Main Form Container -->
        <main class="form-container">
            <!-- Forms Wrapper -->
            <div class="forms-wrapper">
                <!-- ADMIN LOGIN FORM -->
                <div class="form-group admin-forms active">
                    <!-- Admin Login Form -->
                    <form id="adminLoginForm" class="auth-form active" novalidate>
                        <h2 class="form-title">Admin Login</h2>
                        <p class="form-subtitle">Administrator Access Required</p>

                        <div class="admin-badge">🔐 SECURE ADMIN PORTAL</div>

                        <div class="form-field">
                            <label for="adminLoginEmail" class="form-label">
                                <span class="label-text">Admin Email</span>
                                <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-icon">👨‍💼</span>
                                <input 
                                    type="email" 
                                    id="adminLoginEmail" 
                                    name="email"
                                    placeholder="admin@finanalytics.com"
                                    autocomplete="email"
                                    required
                                >
                                <span class="error-icon">⚠️</span>
                            </div>
                            <span class="field-error"></span>
                        </div>

                        <div class="form-field">
                            <label for="adminLoginPassword" class="form-label">
                                <span class="label-text">Password</span>
                                <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-icon">🔒</span>
                                <input 
                                    type="password" 
                                    id="adminLoginPassword" 
                                    name="password"
                                    placeholder="Enter admin password"
                                    autocomplete="current-password"
                                    required
                                >
                                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                    <span class="toggle-icon">👁️</span>
                                </button>
                                <span class="error-icon">⚠️</span>
                            </div>
                            <span class="field-error"></span>
                        </div>

                        <div class="form-field">
                            <label for="adminLoginOTP" class="form-label">
                                <span class="label-text">2FA Code (Optional)</span>
                                <span class="optional">(Optional)</span>
                            </label>
                            <div class="input-group">
                                <span class="input-icon">🔢</span>
                                <input 
                                    type="text" 
                                    id="adminLoginOTP" 
                                    name="twoFactorCode"
                                    placeholder="6-digit code"
                                    maxlength="6"
                                    inputmode="numeric"
                                    autocomplete="off"
                                >
                                <span class="error-icon">⚠️</span>
                            </div>
                            <span class="field-error"></span>
                        </div>

                        <div class="form-row">
                            <label class="checkbox-label">
                                <input type="checkbox" name="rememberMe" value="true">
                                <span>Remember for 24 hours</span>
                            </label>
                            <a href="password-recovery.html" class="forgot-password-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="submit-btn admin-btn">
                            <span class="btn-text">Admin Sign In</span>
                            <span class="loading-spinner"></span>
                        </button>

                        <a href="admin-signup.html" class="toggle-form-btn">
                            Need admin access? <strong>Request registration</strong>
                        </a>

                        <div class="form-message"></div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 FinAnalytics. All rights reserved. | 
                <a href="#" target="_blank">Privacy Policy</a> | 
                <a href="#" target="_blank">Security</a> | 
                <a href="#" target="_blank">Contact</a>
            </p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.10.50/bundle/libphonenumber-js.min.js"></script>
    <script src="auth-forms.js"></script>
</body>
</html>
