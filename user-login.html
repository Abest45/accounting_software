<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User Login - FinAnalytics">
    <meta name="theme-color" content="#2c3e50">
    <title>User Login - FinAnalytics</title>
    <link rel="stylesheet" href="auth-forms.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' fill='%232c3e50'>₹</text></svg>">
</head>
<body>
    <!-- Background Elements -->
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <span class="logo-text">FinAnalytics</span>
            </div>
            <p class="tagline">Professional Financial Management System</p>
        </header>

        <!-- Main Form Container -->
        <main class="form-container">
            <!-- Forms Wrapper -->
            <div class="forms-wrapper">
                <!-- USER LOGIN FORM -->
                <div class="form-group user-forms active">
                    <!-- User Login Form -->
                    <form id="userLoginForm" class="auth-form active" novalidate>
                        <h2 class="form-title">User Login</h2>
                        <p class="form-subtitle">Access your financial dashboard</p>

                        <div class="form-field">
                            <label for="userLoginEmail" class="form-label">
                                <span class="label-text">Email Address</span>
                                <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-icon">✉️</span>
                                <input 
                                    type="email" 
                                    id="userLoginEmail" 
                                    name="email" 
                                    placeholder="your@email.com"
                                    autocomplete="email"
                                    required
                                >
                                <span class="error-icon">⚠️</span>
                            </div>
                            <span class="field-error"></span>
                        </div>

                        <div class="form-field">
                            <label for="userLoginPassword" class="form-label">
                                <span class="label-text">Password</span>
                                <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-icon">🔒</span>
                                <input 
                                    type="password" 
                                    id="userLoginPassword" 
                                    name="password"
                                    placeholder="Enter your password"
                                    autocomplete="current-password"
                                    required
                                >
                                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                    <span class="toggle-icon">👁️</span>
                                </button>
                                <span class="error-icon">⚠️</span>
                            </div>
                            <span class="field-error"></span>
                        </div>

                        <div class="form-row">
                            <label class="checkbox-label">
                                <input type="checkbox" name="rememberMe" value="true">
                                <span>Remember me</span>
                            </label>
                            <a href="password-recovery.html" class="forgot-password-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">Sign In</span>
                            <span class="loading-spinner"></span>
                        </button>

                        <div class="form-divider">OR</div>

                        <a href="user-signup.html" class="toggle-form-btn">
                            Don't have an account? <strong>Sign up here</strong>
                        </a>

                        <div class="form-message"></div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 FinAnalytics. All rights reserved. | 
                <a href="#" target="_blank">Privacy Policy</a> | 
                <a href="#" target="_blank">Security</a> | 
                <a href="#" target="_blank">Contact</a>
            </p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.10.50/bundle/libphonenumber-js.min.js"></script>
    <script src="auth-forms.js"></script>
</body>
</html>
