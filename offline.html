<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - FinAnalytics</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f5f5f5; color:#1a237e; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0;}
    .offline-card {background:#fff; padding:24px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); max-width:520px; text-align:center;}
    h1 {margin-top:0;}
    button {background:#1a237e; color:#fff; border:none; border-radius:6px; padding:10px 16px; cursor:pointer;}
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>Offline Mode</h1>
    <p>You’re currently offline. The app can still show cached contents, and actions are being queued for sync.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
